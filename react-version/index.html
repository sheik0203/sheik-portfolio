<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/letter-s.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sheik Abdullah | Portfolio</title>
    <script>
      // Initialize theme before React loads to prevent flicker
      (function() {
        try {
          const root = document.documentElement;
          const applyTheme = (t) => {
            if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
              root.classList.add('dark');
              root.setAttribute('data-theme', 'dark');
            } else {
              root.classList.remove('dark');
              root.removeAttribute('data-theme');
            }
          };
          
          const savedTheme = localStorage.getItem('theme');
          applyTheme(savedTheme);

          // Listen for changes from other tabs/iframes instantly
          window.addEventListener('storage', (e) => {
            if (e.key === 'theme') applyTheme(e.newValue);
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
